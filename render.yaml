# Render Blueprint — syntax-01
# Target URL: https://syntax-01.onrender.com
# Docs: https://render.com/docs/blueprint-spec
#
# Starter plan stays always-on (no 15‑min sleep).
# Use plan: free only if you accept cold starts after idle.

services:
  - type: web
    name: syntax-01
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.20.0
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
