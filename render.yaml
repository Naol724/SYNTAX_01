# Render Blueprint — Syntax Software Solutions
# Docs: https://render.com/docs/blueprint-spec
#
# Starter plan stays always-on (no 15‑min sleep), so the site opens quickly.
# Switch to `plan: free` only if you accept cold starts after idle.

services:
  - type: web
    name: syntax-software-solutions
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.20.0
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
